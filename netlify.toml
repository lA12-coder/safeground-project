# Netlify Configuration for SafeGround
# Deploy: https://app.netlify.com

[build]
  command = "pnpm run build"
  functions = "netlify/functions"
  publish = ".next"

# Build settings for Next.js with static generation
[build.environment]
  NODE_VERSION = "20.13.0"
  NODE_ENV = "production"

# Rewrite rules for Next.js
[[redirects]]
  from = "/*"
  to = "/.netlify/functions/next :splat"
  status = 200

# Cache control headers
[[headers]]
  for = "/_next/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000"

[[headers]]
  for = "/*.json"
  [headers.values]
    Cache-Control = "public, max-age=300"

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"

# Context-specific builds
[context.production]
  command = "npm run build"

[context.deploy-preview]
  command = "npm run build"

[context.branch-deploy]
  command = "npm run build"
